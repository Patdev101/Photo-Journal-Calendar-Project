<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Journal Calendar</title>
    <link rel="stylesheet" href="calendar.css">
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="header-left">
        <span class="month" id="monthDisplay" onclick="openDatePicker()">January</span>
        <span class="year" id="yearDisplay" onclick="openDatePicker()">2026</span>
    </div>
    <span class="journal">Marithe's journal</span>
    <div class="nav-controls">
        <button class="nav-btn" onclick="changeMonth(-1)">← Prev</button>
        <button class="nav-btn" onclick="changeMonth(1)">Next →</button>
    </div>
</div>

<!-- DATE PICKER MODAL -->
<div class="date-picker-overlay" id="datePickerOverlay" onclick="closeDatePicker()">
    <div class="date-picker-modal" onclick="event.stopPropagation()">
        <div class="date-picker-header">
            <h2>Select Date</h2>
            <button class="date-picker-close" onclick="closeDatePicker()">✕</button>
        </div>
        
        <div class="date-picker-body">
            <div class="date-picker-controls">
                <button class="date-picker-nav" onclick="changePickerYear(-12)">⏮</button>
                <button class="date-picker-nav" onclick="changePickerYear(-1)">◀</button>
                <span class="date-picker-year-label" id="pickerYearLabel">2026</span>
                <button class="date-picker-nav" onclick="changePickerYear(1)">▶</button>
                <button class="date-picker-nav" onclick="changePickerYear(12)">⏭</button>
            </div>
            
            <div class="date-picker-months" id="pickerMonths">
                <!-- Months will be generated by JS -->
            </div>
            
            <div class="date-picker-actions">
                <button class="date-picker-btn" onclick="closeDatePicker()">Cancel</button>
                <button class="date-picker-btn primary" onclick="goToSelectedDate()">Go</button>
            </div>
        </div>
    </div>
</div>

<!-- SLIDER - SHOWS ONLY 3 PHOTOS -->
<div class="slider-container" id="sliderContainer">
    <div class="slider-track" id="sliderTrack"></div>
    <div class="slider-nav">
        <button class="slider-arrow" id="prevSlideBtn">‹</button>
        <button class="slider-arrow" id="nextSlideBtn">›</button>
    </div>
</div>
<div class="slider-dots" id="sliderDots"></div>

<!-- CALENDAR -->
<div class="calendar">
    <div class="days">
        <div>Sunday</div><div>Monday</div><div>Tuesday</div>
        <div>Wednesday</div><div>Thursday</div><div>Friday</div><div>Saturday</div>
    </div>
    <div class="grid" id="grid"></div>
</div>

<!-- FOOTER -->
<div class="footer">
    <div class="footer-left">Free area or<br>note area</div>
    <div class="footer-right"><a href="#" onclick="goToToday()">Today</a></div>
</div>

<input type="file" id="fileInput" accept="image/*">

<!-- VIEWER -->
<div class="viewer" id="viewer" onclick="closeViewerOnClick(event)">
    <!-- TOP BUTTONS - FIXED POSITION -->
    <div class="viewer-top-buttons">
        <button class="top-icon-btn left-btn" onclick="closeViewer()">✕</button>
        <button class="top-icon-btn delete-btn right-btn" onclick="deletePhoto()">🗑</button>
    </div>

    <div class="viewer-content" onclick="event.stopPropagation()">
        <div class="viewer-image-wrapper">
            <img id="viewerImage">
            <!-- HEART BUTTON -->
            <button class="heart-btn" id="heartBtn" onclick="toggleHeart()">
                <span class="heart-icon">♡</span>
            </button>
        </div>

        <div class="viewer-meta">
            <div class="date-location" id="viewerDate">January 1, 2026</div>
            
            <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                <span class="location" id="viewerLocationDisplay" onclick="editLocation()">
                    <span class="location-placeholder">Click to add city or street</span>
                </span>
                <span class="location-badge not-detected" id="locationBadge">📍 Not detected</span>
                <input class="location-edit" id="viewerLocationEdit" type="text" 
                       placeholder="Type city or street..."
                       onblur="saveLocation()" onkeydown="if(event.key==='Enter')saveLocation()">
            </div>

            <div class="desc" id="viewerDescDisplay" onclick="editDescription()">
                <span class="desc-placeholder">Add Description</span>
            </div>
            <textarea class="desc-edit" id="viewerDescEdit" 
                      onblur="saveDescription()" 
                      placeholder="Add Description"></textarea>
        </div>
    </div>
</div>

<script src="calendar.js"></script>
</body>
</html>
